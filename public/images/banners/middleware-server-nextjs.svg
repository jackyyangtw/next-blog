<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="686" viewBox="0 0 1600 686" role="img" aria-labelledby="title desc">
  <title id="title">Middleware Server Next.js Banner</title>
  <desc id="desc">Abstract Next.js middleware and server banner with routing paths, server panels, and luminous request flow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.45" stop-color="#123b52"/>
      <stop offset="1" stop-color="#1f5f5b"/>
    </linearGradient>
    <linearGradient id="route" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.14"/>
      <stop offset="0.5" stop-color="#f8fafc" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0.24"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#bae6fd" stop-opacity="0.86"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="52%">
      <stop offset="0" stop-color="#ccfbf1" stop-opacity="0.52"/>
      <stop offset="1" stop-color="#ccfbf1" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
  </defs>
