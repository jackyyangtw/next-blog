<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1600"
  height="686"
  viewBox="0 0 1600 686"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Next.js App Router Server Client Boundary Banner</title>
  <desc id="desc">
    Abstract Next.js App Router banner showing the boundary between server
    components and client components, with RSC payload flowing through the use
    client boundary.
  </desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#06111f" />
      <stop offset="0.48" stop-color="#082f49" />
      <stop offset="1" stop-color="#134e4a" />
    </linearGradient>
    <linearGradient id="serverPanel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#e0f2fe" />
      <stop offset="1" stop-color="#c7d2fe" />
    </linearGradient>
    <linearGradient id="clientPanel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ccfbf1" />
      <stop offset="1" stop-color="#fef3c7" />
    </linearGradient>
    <linearGradient id="boundary" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.24" />
      <stop offset="0.5" stop-color="#22d3ee" stop-opacity="0.9" />
      <stop offset="1" stop-color="#facc15" stop-opacity="0.28" />
    </linearGradient>
    <linearGradient id="payload" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#bae6fd" stop-opacity="0.1" />
      <stop offset="0.48" stop-color="#67e8f9" stop-opacity="0.88" />
      <stop offset="1" stop-color="#fef08a" stop-opacity="0.24" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="54%">
      <stop offset="0" stop-color="#ecfeff" stop-opacity="0.34" />
      <stop offset="1" stop-color="#ecfeff" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#e0f2fe" stroke-opacity="0.12" />
      <circle cx="0" cy="0" r="1.8" fill="#a5f3fc" fill-opacity="0.24" />
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow
        dx="0"
        dy="18"
        stdDeviation="18"
        flood-color="#020617"
        flood-opacity="0.32"
      />
    </filter>
  </defs>
  <rect width="1600" height="686" fill="url(#bg)" />
  <rect width="1600" height="686" fill="url(#grid)" opacity="0.72" />
  <ellipse cx="800" cy="342" rx="610" ry="286" fill="url(#glow)" />

  <path
    d="M174 348C302 258 416 424 548 342C664 270 736 306 800 342C890 392 972 270 1094 342C1228 420 1350 282 1468 346"
    fill="none"
    stroke="url(#payload)"
    stroke-linecap="round"
    stroke-width="16"
    opacity="0.72"
  />
  <path
    d="M178 220C326 168 440 204 552 178C664 154 720 190 800 218C900 252 1010 172 1132 198C1272 228 1370 178 1462 132"
    fill="none"
    stroke="#99f6e4"
    stroke-linecap="round"
    stroke-width="6"
    opacity="0.22"
  />

