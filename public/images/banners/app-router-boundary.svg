  <g fill="#0f172a" opacity="0.72">
    <rect x="220" y="294" width="116" height="14" rx="7" />
    <rect x="220" y="326" width="86" height="10" rx="5" />
    <circle cx="476" cy="308" r="24" />
    <rect x="222" y="414" width="132" height="12" rx="6" />
    <rect x="222" y="438" width="250" height="10" rx="5" />
    <rect x="1090" y="294" width="104" height="14" rx="7" />
    <rect x="1090" y="326" width="74" height="10" rx="5" />
    <circle cx="1332" cy="308" r="24" />
    <rect x="1092" y="414" width="132" height="12" rx="6" />
    <rect x="1092" y="438" width="238" height="10" rx="5" />
  </g>

  <g
    fill="none"
    stroke="#0f172a"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-width="7"
    opacity="0.66"
  >
    <path d="M454 308h44M476 286v44" />
    <path d="M430 294c14 -18 78 -18 92 0" />
    <path d="M1314 296h36v30h-36z" />
    <path d="M1322 296v-14h20v14" />
    <path d="M1332 326v14" />
  </g>

  <g
    font-family="Inter, Segoe UI, Arial, sans-serif"
    font-weight="800"
    text-anchor="middle"
  >
    <text x="284" y="592" fill="#e0f2fe" font-size="24">
      data, secrets, RSC payload
    </text>
    <text x="1316" y="592" fill="#ccfbf1" font-size="24">
      state, events, browser APIs
    </text>
  </g>

  <g fill="#ffffff" opacity="0.22">
    <circle cx="644" cy="142" r="5" />
    <circle cx="644" cy="550" r="7" />
    <circle cx="956" cy="142" r="6" />
    <circle cx="956" cy="550" r="5" />
    <circle cx="800" cy="78" r="4" />
    <circle cx="800" cy="614" r="6" />
