    <rect x="1270" y="264" width="126" height="88" rx="18" fill="#dcfce7" />
    <rect x="1060" y="390" width="336" height="76" rx="18" fill="#fef9c3" />
  </g>

  <g filter="url(#shadow)">
    <rect
      x="704"
      y="104"
      width="192"
      height="478"
      rx="28"
      fill="#020617"
      opacity="0.74"
    />
    <rect
      x="742"
      y="150"
      width="116"
      height="386"
      rx="58"
      fill="url(#boundary)"
