    </text>
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M540 308H690" stroke="#bae6fd" stroke-width="8" opacity="0.64" />
    <path d="M910 308H1060" stroke="#fef08a" stroke-width="8" opacity="0.64" />
    <path
